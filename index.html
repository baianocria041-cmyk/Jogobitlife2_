<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BitLife Brasil Pro</title>
    <style>
        :root { --green: #2ecc71; --red: #e74c3c; --blue: #3498db; --yellow: #f1c40f; --dark: #222; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); margin: 0; display: flex; justify-content: center; }
        #app { width: 100%; max-width: 500px; height: 100vh; background: #fff; display: flex; flex-direction: column; position: relative; overflow: hidden; }
        #header { background: var(--green); color: white; padding: 20px; text-align: center; }
        #log { flex: 1; overflow-y: auto; padding: 15px; background: #f4f4f4; display: flex; flex-direction: column-reverse; }
        .log-item { padding: 10px; border-bottom: 1px solid #ddd; font-size: 13px; background: white; margin-bottom: 5px; border-left: 5px solid var(--green); border-radius: 5px; }
        .controls { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; padding: 10px; background: #ddd; }
        button { border: none; padding: 12px; border-radius: 5px; font-weight: bold; cursor: pointer; color: white; transition: 0.2s; }
        button:active { transform: scale(0.95); }
        .overlay { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 100; flex-direction: column; padding: 20px; box-sizing: border-box; }
        .stats { display: flex; justify-content: space-around; background: #eee; padding: 10px; font-size: 12px; font-weight: bold; }
        .item-row { display: flex; justify-content: space-between; padding: 15px; border-bottom: 1px solid #eee; align-items: center; }
        .search-bar { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .list-container { flex: 1; overflow-y: auto; }
    </style>
</head>
<body>

<div id="app">
    <div id="header">
        <h2 id="v-job">Bebê</h2>
        <h3 id="v-money">R$ 50</h3>
    </div>

    <div class="stats">
        <span>Idade: <b id="v-age">0</b></span>
        <span>Edu: <b id="v-edu">0</b></span>
        <span id="v-social" style="color: blue;">Social: Inativo</span>
    </div>

    <div id="log"></div>

    <div id="m-jobs" class="overlay">
        <h2>Vagas Disponíveis</h2>
        <input type="text" id="search-job" class="search-bar" placeholder="🔍 Buscar profissão..." oninput="renderizarEmpregos()">
        <div id="job-list" class="list-container"></div>
        <button onclick="fecharMenus()" style="background: #333; width: 100%; margin-top: 10px;">VOLTAR</button>
    </div>

    <div id="m-gov" class="overlay">
        <h2>Ministério Social</h2>
        <p>Status: <b id="status-bolsa">Não cadastrado</b></p>
        <hr>
        <button onclick="cadastrarSocial()" style="background: var(--blue); width: 100%; margin-bottom: 10px;">Fazer Cadastro Único</button>
        <button onclick="pedirBolsa()" id="btn-pedir" style="background: var(--green); width: 100%; display: none;">Solicitar Bolsa Família</button>
        <button onclick="fecharMenus()" style="background: #333; width: 100%; margin-top: 20px;">Voltar</button>
    </div>

    <div class="controls">
        <button onclick="envelhecer()" style="background: var(--green); grid-column: span 3; font-size: 18px;">+ PASSAR ANO</button>
        <button style="background: var(--blue)" onclick="abrirEmpregos()">EMPREGOS</button>
        <button style="background: #e67e22" onclick="abrirGov()">GOVERNO</button>
        <button style="background: var(--yellow); color: black" onclick="estudar()">ESTUDAR</button>
    </div>
</div>

<script src="dados.js"></script>
<script>
    let p = { 
        age: 0, money: 50, job: null, edu: 0, 
        cadastrado: false, bolsaAtiva: false 
    };

    function updateUI() {
        document.getElementById('v-money').innerText = "R$ " + Math.floor(p.money).toLocaleString();
        document.getElementById('v-age').innerText = p.age;
        document.getElementById('v-job').innerText = p.job ? p.job.n : "Desempregado";
        document.getElementById('v-social').innerText = p.bolsaAtiva ? "Social: Recebendo" : "Social: Inativo";
    }

    function addLog(msg, cor = "#2ecc71") {
        const log = document.getElementById('log');
        log.innerHTML += `<div class="log-item" style="border-left-color: ${cor}">${msg}</div>`;
    }

    function envelhecer() {
        p.age++;
        let rendaAno = 0;

        if(p.job) {
            let bruto = p.job.s;
            // Imposto de Renda (27.5% acima de 5000)
            if(bruto > 5000) {
                let imp = bruto * 0.275;
                bruto -= imp;
                addLog(`📉 Imposto retido: -R$ ${imp.toFixed(0)}`, "red");
            }
            rendaAno = bruto;
            p.money += rendaAno;
            addLog(`💰 Salário recebido: R$ ${rendaAno.toFixed(0)}`);
        }

        if(p.bolsaAtiva) {
            if(rendaAno > 2180) {
                p.bolsaAtiva = false;
                addLog("⚠️ Auxílio cortado: Renda acima do limite!", "orange");
            } else {
                p.money += 600;
                addLog("💸 Recebeu R$ 600 do Bolsa Família", "blue");
            }
        }
        updateUI();
    }

    // --- SISTEMA DE EMPREGOS ---
    function abrirEmpregos() {
        if(p.age < 14) return alert("Você precisa ter pelo menos 14 anos para trabalhar!");
        document.getElementById('m-jobs').style.display = 'flex';
        renderizarEmpregos();
    }

    function renderizarEmpregos() {
        const busca = document.getElementById('search-job').value.toLowerCase();
        const lista = document.getElementById('job-list');
        lista.innerHTML = "";

        // Filtra os empregos do banco de dados
        const filtrados = BANCO_DE_DADOS.empregos.filter(j => 
            j.n.toLowerCase().includes(busca) && p.age >= j.a && p.edu >= j.e
        ).slice(0, 30); // Mostra 30 por vez para não travar

        filtrados.forEach(j => {
            lista.innerHTML += `
                <div class="item-row">
                    <span><b>${j.n}</b><br><small>Salário: R$ ${j.s} | ${j.dif}</small></span>
                    <button onclick="contratar('${j.n}')" style="background:var(--blue)">Aceitar</button>
                </div>`;
        });
    }

    function contratar(nome) {
        p.job = BANCO_DE_DADOS.empregos.find(j => j.n === nome);
        addLog(`💼 Novo emprego: ${nome}!`, "var(--blue)");
        fecharMenus();
    }

    // --- SISTEMA GOVERNO ---
    function abrirGov() {
        document.getElementById('m-gov').style.display = 'flex';
        document.getElementById('status-bolsa').innerText = p.cadastrado ? "Cadastrado" : "Não cadastrado";
        document.getElementById('btn-pedir').style.display = (p.cadastrado && !p.bolsaAtiva) ? 'block' : 'none';
    }

    function cadastrarSocial() {
        p.cadastrado = true;
        addLog("📋 Cadastro Único realizado com sucesso.");
        abrirGov();
    }

    function pedirBolsa() {
        let renda = p.job ? p.job.s : 0;
        if(renda <= 2180) {
            p.bolsaAtiva = true;
            addLog("✅ Bolsa Família APROVADO!", "blue");
        } else {
            alert("Renda muito alta para receber auxílio!");
        }
        fecharMenus();
    }

    function estudar() {
        if(p.money >= 500) {
            p.money -= 500;
            p.edu++;
            addLog("🎓 Você estudou e aumentou seu nível de educação!");
        } else { alert("Dinheiro insuficiente para o curso!"); }
        updateUI();
    }

    function fecharMenus() {
        document.querySelectorAll('.overlay').forEach(el => el.style.display = 'none');
        updateUI();
    }

    updateUI();
</script>
</body>
</html>
