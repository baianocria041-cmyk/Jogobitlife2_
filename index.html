<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <title>BitLife Brasil: Vida Real</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <style>
        :root {
            --bg: #f4f7f6; --card: #ffffff; --primary: #27ae60;
            --secondary: #2980b9; --danger: #e74c3c; --social: #e1306c;
            --text: #2c3e50; --gold: #f1c40f; --accent: #8e44ad;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: var(--bg); 
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        #app { width: 100%; max-width: 500px; height: 100vh; margin: auto; display: flex; flex-direction: column; position: relative; background: var(--bg); }

        /* Status Bar */
        #header { 
            background: var(--primary); color: white; padding: 20px; 
            border-bottom-left-radius: 25px; border-bottom-right-radius: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center;
        }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 10px; }
        .stat-item { background: rgba(255,255,255,0.2); padding: 5px; border-radius: 10px; font-size: 10px; font-weight: bold; }

        /* Log Central */
        #log { 
            flex: 1; 
            overflow-y: auto; 
            padding: 15px; 
            display: flex; 
            flex-direction: column-reverse; 
            gap: 10px;
            padding-bottom: 120px; /* Espaço para não cobrir os botões */
        }
        .log-entry { 
            background: white; padding: 12px; border-radius: 15px; font-size: 13px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05); border-left: 5px solid var(--primary);
            animation: slideIn 0.3s ease-out;
        }

        /* Botões Fixos no Fundo */
        .nav-container {
            position: absolute;
            bottom: 0;
            width: 100%;
            background: white;
            padding: 10px;
            border-top-left-radius: 25px;
            border-top-right-radius: 25px;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.1);
            z-index: 99;
        }
        
        .nav-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        
        button { border: none; border-radius: 12px; font-weight: bold; cursor: pointer; color: white; padding: 10px 2px; font-size: 10px; }
        
        .btn-age { 
            grid-column: span 4; 
            padding: 15px; 
            font-size: 18px; 
            background: var(--primary); 
            margin-bottom: 8px;
            box-shadow: 0 4px 0 #1e8449;
        }

        /* Modal Overlay */
        .overlay { 
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: var(--bg); z-index: 1000; flex-direction: column; padding: 20px; 
        }

        #pop-alert {
            display: none; position: absolute; top: 30%; left: 10%; width: 80%;
            background: var(--gold); padding: 20px; border-radius: 20px; text-align: center;
            z-index: 2000; font-weight: bold; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="app">
    <div id="pop-alert">✨ CONQUISTA! ✨</div>

    <div id="header">
        <div id="v-job" style="font-size: 18px; font-weight: 900;">Bebé</div>
        <div id="v-money" style="font-size: 26px; font-weight: 900;">R$ 50</div>
        <div class="stats-grid">
            <div class="stat-item">📅 <span id="v-date">Jan, 0 anos</span></div>
            <div class="stat-item">🎓 Edu: <span id="v-edu">0</span></div>
            <div class="stat-item">📱 <span id="v-fans">0</span> fãs</div>
        </div>
        <div id="v-birth" style="font-size: 9px; margin-top: 8px; opacity: 0.8;">Nascido a: --/--/----</div>
    </div>

    <div id="log"></div>

    <div id="modal" class="overlay">
        <h2 id="m-title" style="text-align: center; margin-bottom: 20px;">MENU</h2>
        <div id="m-content" style="flex:1; overflow-y:auto;"></div>
        <button onclick="closeMod()" style="background:#333; padding:15px; width:100%; font-size: 16px;">VOLTAR</button>
    </div>

    <div class="nav-container">
        <div class="nav-grid">
            <button class="btn-age" onclick="passarMes()">PRÓXIMO MÊS ➔</button>
            <button style="background: var(--secondary)" onclick="abrir('jobs')">💼 Emprego</button>
            <button style="background: var(--accent)" onclick="abrir('edu')">🎓 Estudar</button>
            <button style="background: var(--social)" onclick="abrir('social')">📱 Social</button>
            <button style="background: var(--danger)" onclick="abrir('love')">❤️ Amor</button>
        </div>
    </div>
</div>

<script>
const DB = {
    empregos: [
        {n: "Panfleteiro", s: 1200, a: 14, e: 0},
        {n: "YouTuber Teen", s: 3000, a: 13, e: 0, f: 5000},
        {n: "Vendedor", s: 2800, a: 18, e: 1},
        {n: "Programador", s: 6000, a: 18, e: 2},
        {n: "Médico", s: 25000, a: 25, e: 5},
        {n: "Jogador de Futebol", s: 150000, a: 17, e: 0, f: 500000},
        {n: "Cantor de Sucesso", s: 80000, a: 16, e: 0, f: 200000}
    ],
    cursos: [
        {n: "Curso Técnico", t: 12, e: 2, c: 300},
        {n: "Faculdade Direito", t: 60, e: 3, c: 1200},
        {n: "Faculdade Medicina", t: 72, e: 5, c: 4000}
    ],
    famosos: ["Neymar", "Anitta", "Casimiro", "Virginia", "Cristiano Ronaldo"]
};

let p = {
    mes: 0, ano: 0, money: 50, job: null, edu: 0, fans: 0, 
    faculdade: null, cursoProg: 0, faltas: 0, relacao: null
};

function iniciar() {
    let d = Math.floor(Math.random() * 28) + 1;
    let m = Math.floor(Math.random() * 12) + 1;
    let a = 2026 - 0; 
    document.getElementById('v-birth').innerText = `Nascido a: ${d}/${m}/${a}`;
    update();
}

function update() {
    document.getElementById('v-money').innerText = "R$ " + Math.floor(p.money).toLocaleString();
    document.getElementById('v-edu').innerText = p.edu;
    document.getElementById('v-fans').innerText = p.fans >= 1000000 ? (p.fans/1000000).toFixed(1) + "M" : p.fans.toLocaleString();
    document.getElementById('v-date').innerText = `${["Jan", "Fev", "Mar", "Abr", "Mai", "Jun", "Jul", "Ago", "Set", "Out", "Nov", "Dez"][p.mes]}, ${p.ano} anos`;
    document.getElementById('v-job').innerText = p.job ? p.job.n : (p.faculdade ? "Estudante" : "Desempregado");
}

function passarMes() {
    p.mes++;
    if(p.mes > 11) { p.mes = 0; p.ano++; flash(`🎂 Parabéns! ${p.ano} anos.`); }

    if(p.job) {
        if(Math.random() < 0.2) {
            addLog("⚠️ O chefe reparou no teu esforço!", "var(--primary)");
        }
        p.money += (p.job.s / 12);
    }

    if(p.faculdade) {
        if(p.money >= p.faculdade.c) {
            p.money -= p.faculdade.c;
            p.cursoProg++;
            if(p.cursoProg >= p.faculdade.t) {
                p.edu += p.faculdade.e;
                flash("🎓 FORMATURA CONCLUÍDA!");
                p.faculdade = null;
            }
        } else { addLog("🚨 Sem dinheiro para a mensalidade!", "orange"); }
    }

    if(p.fans > 50000) p.money += (p.fans * 0.005);
    update();
}

function abrir(tipo) {
    const cont = document.getElementById('m-content');
    cont.innerHTML = ""; document.getElementById('modal').style.display = 'flex';
    document.getElementById('m-title').innerText = tipo.toUpperCase();

    if(tipo === 'jobs') {
        if(p.job) {
            cont.innerHTML = `<div class="card">Estás a trabalhar como ${p.job.n} <button style="background:red" onclick="demitir()">Pedir Demissão</button></div>
            <button class="btn-age" style="background:orange; width:100%" onclick="faltar()">Faltar ao Trabalho</button>`;
        }
        DB.empregos.forEach(j => {
            let ok = (p.edu >= j.e && p.ano >= j.a && (!j.f || p.fans >= j.f));
            cont.innerHTML += `<div class="card">
                <div><b>${j.n}</b><br><small>R$ ${j.s}/mês</small></div>
                <button style="background:${ok?'var(--primary)':'#ccc'}" onclick="contratar('${j.n}')">ENTRAR</button>
            </div>`;
        });
    } else if(tipo === 'edu') {
        DB.cursos.forEach(c => {
            cont.innerHTML += `<div class="card">
                <div><b>${c.n}</b><br><small>R$ ${c.c}/mês</small></div>
                <button style="background:var(--accent)" onclick="estudar('${c.n}')">CURSAR</button>
            </div>`;
        });
    } else if(tipo === 'social') {
        cont.innerHTML = `<button class="btn-age" style="background:var(--social); width:100%" onclick="postar()">📸 Postar Foto Viral</button>
        <p style="text-align:center; margin-top:10px">Famoso do dia: ${DB.famosos[Math.floor(Math.random()*DB.famosos.length)]}</p>`;
    } else if(tipo === 'love') {
        if(!p.relacao) {
            cont.innerHTML = `<button class="btn-age" style="background:var(--danger); width:100%" onclick="flertar()">💞 Tinder Brasil</button>`;
        } else {
            cont.innerHTML = `<div class="card">❤️ Namorada: ${p.relacao}</div>
            <button class="btn-age" style="background:purple; width:100%" onclick="dormir()">🛌 Dormir Junto</button>
            <button class="btn-age" style="background:#333; width:100%" onclick="terminar()">Terminar Relação</button>`;
        }
    }
}

function contratar(n) {
    let j = DB.empregos.find(x => x.n === n);
    if(p.edu >= j.e && p.ano >= j.a && (!j.f || p.fans >= j.f)) {
        p.job = j; flash("💼 TRABALHO NOVO!"); closeMod();
    }
}

function faltar() { addLog("🙈 Faltaste ao trabalho. O chefe não gostou!", "red"); closeMod(); }
function demitir() { p.job = null; addLog("👋 Te demitiste!", "gray"); closeMod(); }
function estudar(n) { p.faculdade = DB.cursos.find(x => x.n === n); p.cursoProg = 0; flash("📖 MATRICULADO!"); closeMod(); }
function postar() { let g = Math.floor(Math.random()*2000); p.fans += g; flash(`📱 +${g} FÃS!`); closeMod(); }
function flertar() { p.relacao = ["Ana", "Bia", "Carla", "Duda"][Math.floor(Math.random()*4)]; flash(`❤️ Começaste a namorar com ${p.relacao}!`); closeMod(); }
function dormir() { addLog(`🛌 Noite romântica com ${p.relacao}...`, "purple"); closeMod(); }
function terminar() { p.relacao = null; addLog("💔 Estás solteiro.", "gray"); closeMod(); }

function flash(t) { const e = document.getElementById('pop-alert'); e.innerText = t; e.style.display = 'block'; setTimeout(()=>e.style.display='none', 2000); }
function addLog(m, c) { document.getElementById('log').innerHTML += `<div class="log-entry" style="border-left-color:${c}">${m}</div>`; }
function closeMod() { document.getElementById('modal').style.display = 'none'; update(); }

iniciar();
</script>
</body>
</html>
