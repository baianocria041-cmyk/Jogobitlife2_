<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>BitLife Brasil: Dark Premium</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app">
    <div id="pop-alert">LEVEL UP!</div>

    <div id="header">
        <div id="v-job">Nascituro</div>
        <div id="v-money">R$ 0</div>
        <div class="stats-grid">
            <div class="stat-item">📅 Mês/Ano<b id="v-date">Jan, 0</b></div>
            <div class="stat-item">🧠 Intelecto<b id="v-edu">0</b></div>
            <div class="stat-item">🔥 Seguidores<b id="v-fans">0</b></div>
        </div>
        <div id="v-birth"></div>
    </div>

    <div id="log"></div>

    <div id="modal" class="overlay">
        <div class="modal-header">
            <h2 id="m-title">MENU</h2>
            <button onclick="closeMod()" class="btn-close">FECHAR</button>
        </div>
        <div id="m-content"></div>
    </div>

    <div class="nav-container">
        <div class="nav-grid">
            <button class="btn-age" onclick="passarMes()">AVANÇAR MÊS</button>
            <button class="btn-menu sec" onclick="abrir('jobs')">💼 CARREIRA</button>
            <button class="btn-menu acc" onclick="abrir('edu')">🎓 ESTUDO</button>
            <button class="btn-menu soc" onclick="abrir('social')">📱 SOCIAL</button>
            <button class="btn-menu dan" onclick="abrir('life')">🎲 VIDA</button>
        </div>
    </div>
</div>

    <script src="script.js"></script>
</body>
</html>
