<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BitLife Brasil Pro</title>
    <style>
        :root { --green: #2ecc71; --red: #e74c3c; --blue: #3498db; --yellow: #f1c40f; }
        body { font-family: 'Segoe UI', sans-serif; background: #222; margin: 0; display: flex; justify-content: center; }
        #app { width: 100%; max-width: 500px; height: 100vh; background: #fff; display: flex; flex-direction: column; position: relative; }
        #header { background: var(--green); color: white; padding: 20px; text-align: center; }
        #log { flex: 1; overflow-y: auto; padding: 15px; background: #f4f4f4; display: flex; flex-direction: column-reverse; }
        .log-item { padding: 10px; border-bottom: 1px solid #ddd; font-size: 13px; background: white; margin-bottom: 5px; border-left: 5px solid var(--green); }
        .controls { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; padding: 10px; background: #ddd; }
        button { border: none; padding: 12px; border-radius: 5px; font-weight: bold; cursor: pointer; color: white; }
        .btn-gov { background: #555; grid-column: span 3; margin-bottom: 5px; }
        .overlay { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 10; flex-direction: column; padding: 20px; box-sizing: border-box; }
        .stats { display: flex; justify-content: space-around; background: #eee; padding: 10px; font-size: 12px; font-weight: bold; }
    </style>
</head>
<body>

<div id="app">
    <div id="header">
        <h2 id="v-job">Bebê</h2>
        <h3 id="v-money">R$ 0</h3>
    </div>

    <div class="stats">
        <span>Idade: <b id="v-age">0</b></span>
        <span>Edu: <b id="v-edu">0</b></span>
        <span id="v-social" style="color: blue;">Social: Inativo</span>
    </div>

    <div id="log"></div>

    <div id="m-gov" class="overlay">
        <h2>Ministério do Desenvolvimento Social</h2>
        <p>Status: <b id="status-bolsa">Não cadastrado</b></p>
        <hr>
        <button onclick="cadastrarSocial()" style="background: var(--blue); width: 100%; margin-bottom: 10px;">Fazer Cadastro Único</button>
        <button onclick="pedirBolsa()" id="btn-pedir" style="background: var(--green); width: 100%; display: none;">Solicitar Bolsa Família</button>
        <br><br>
        <button onclick="fecharMenus()" style="background: #333; width: 100%;">Voltar</button>
    </div>

    <div class="controls">
        <button onclick="envelhecer()" style="background: var(--green); grid-column: span 3; font-size: 18px;">+ PASSAR ANO</button>
        <button class="btn-gov" onclick="abrirGov()">GOVERNO / AUXÍLIO</button>
        <button style="background: var(--blue)" onclick="alert('Abra o menu de empregos conforme os códigos anteriores')">EMPREGOS</button>
        <button style="background: var(--yellow); color: black" onclick="estudar()">ESTUDAR</button>
        <button style="background: var(--red)" onclick="alert('Sistema de crimes')">CRIME</button>
    </div>
</div>

<script src="dados.js"></script>
<script>
    let p = { 
        age: 0, money: 50, job: null, edu: 0, 
        cadastrado: false, bolsaAtiva: false 
    };

    function updateUI() {
        document.getElementById('v-money').innerText = "R$ " + Math.floor(p.money).toLocaleString();
        document.getElementById('v-age').innerText = p.age;
        document.getElementById('v-job').innerText = p.job ? p.job.n : "Desempregado";
        document.getElementById('v-social').innerText = p.bolsaAtiva ? "Social: Recebendo" : "Social: Inativo";
    }

    function addLog(msg, cor = "#2ecc71") {
        const log = document.getElementById('log');
        log.innerHTML += `<div class="log-item" style="border-left-color: ${cor}">${msg}</div>`;
    }

    function envelhecer() {
        p.age++;
        let rendaAno = 0;

        // Sistema de Salário e Imposto
        if(p.job) {
            let salarioBruto = p.job.s;
            let imposto = 0;

            // Se ganhar mais de R$ 5.000, paga 15% de imposto
            if(salarioBruto > 5000) {
                imposto = salarioBruto * BANCO_DE_DADOS.config.imposto_renda;
                addLog(`📉 Imposto de Renda retido: R$ ${imposto.toFixed(2)}`, "red");
            }
            
            rendaAno = salarioBruto - imposto;
            p.money += rendaAno;
            addLog(`💰 Recebeu R$ ${rendaAno.toFixed(2)} de salário (${p.job.dif}).`);
        }

        // Sistema de Bolsa Família
        if(p.bolsaAtiva) {
            // Se a renda for maior que o limite, o governo corta o benefício
            if(rendaAno > BANCO_DE_DADOS.config.piso_pobreza) {
                p.bolsaAtiva = false;
                addLog("⚠️ Governo cortou seu Bolsa Família: Renda alta demais!", "orange");
            } else {
                p.money += BANCO_DE_DADOS.config.valor_bolsa;
                addLog(`💸 Você recebeu R$ ${BANCO_DE_DADOS.config.valor_bolsa} do Bolsa Família.`);
            }
        }

        updateUI();
    }

    function abrirGov() {
        document.getElementById('m-gov').style.display = 'flex';
        document.getElementById('status-bolsa').innerText = p.cadastrado ? "Cadastrado" : "Não cadastrado";
        if(p.cadastrado && !p.bolsaAtiva) document.getElementById('btn-pedir').style.display = 'block';
    }

    function cadastrarSocial() {
        if(p.cadastrado) return alert("Você já tem cadastro!");
        p.cadastrado = true;
        addLog("📋 Você fez o Cadastro Único no CRAS.");
        abrirGov();
    }

    function pedirBolsa() {
        // Chance de 70% de ser aprovado se estiver desempregado ou ganhar pouco
        let renda = p.job ? p.job.s : 0;
        if(renda < BANCO_DE_DADOS.config.piso_pobreza) {
            if(Math.random() > 0.3) {
                p.bolsaAtiva = true;
                addLog("✅ Seu Bolsa Família foi APROVADO!", "blue");
            } else {
                addLog("❌ Pedido de auxílio negado. Tente ano que vem.", "red");
            }
        } else {
            alert("Renda muito alta para solicitar auxílio!");
        }
        fecharMenus();
    }

    function fecharMenus() {
        document.querySelectorAll('.overlay').forEach(el => el.style.display = 'none');
        updateUI();
    }

    updateUI();
</script>
</body>
</html>
