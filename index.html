<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BitLife Brasil: Crime & Social</title>
    <style>
        :root { --green: #2ecc71; --red: #e74c3c; --blue: #3498db; --yellow: #f1c40f; --dark: #1a1a1a; }
        body { font-family: sans-serif; background: var(--dark); margin: 0; color: #333; }
        #app { width: 100%; max-width: 500px; height: 100vh; background: #fff; margin: auto; display: flex; flex-direction: column; position: relative; }
        #header { background: var(--green); color: white; padding: 15px; text-align: center; }
        #log { flex: 1; overflow-y: auto; padding: 15px; background: #f4f4f4; display: flex; flex-direction: column-reverse; }
        .log-item { padding: 10px; border-bottom: 1px solid #ddd; font-size: 13px; background: white; margin-bottom: 5px; border-left: 5px solid var(--green); }
        .controls { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; padding: 10px; background: #ddd; }
        button { border: none; padding: 12px 5px; border-radius: 5px; font-weight: bold; color: white; cursor: pointer; font-size: 10px; }
        .overlay { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 100; flex-direction: column; padding: 20px; box-sizing: border-box; }
        .item-row { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid #eee; align-items: center; }
        .prison { background: #000 !important; color: #ff0000 !important; }
    </style>
</head>
<body>

<div id="app">
    <div id="header" id="header-bg">
        <h2 id="v-job">Carregando...</h2>
        <h3 id="v-money">R$ 0</h3>
        <small>Educação Nível: <b id="v-edu">0</b> | Idade: <b id="v-age">0</b></small>
    </div>

    <div id="log"></div>

    <div id="m-list" class="overlay">
        <h2 id="m-title">Menu</h2>
        <div id="list-content" style="flex:1; overflow-y:auto;"></div>
        <button onclick="fechar()" style="background:#333; width:100%; margin-top:10px; font-size:16px;">VOLTAR</button>
    </div>

    <div class="controls">
        <button onclick="envelhecer()" style="background:var(--green); grid-column: span 4; font-size: 16px;">+ PASSAR ANO</button>
        <button style="background:var(--blue)" onclick="abrir('jobs')">EMPREGOS</button>
        <button style="background:var(--red)" onclick="abrir('crime')">CRIMES</button>
        <button style="background:#e67e22)" onclick="abrir('gov')">GOVERNO</button>
        <button style="background:var(--yellow); color:#000" onclick="estudar()">ESTUDAR</button>
    </div>
</div>

<script src="dados.js"></script>

<script>
    let p = { age: 0, money: 50, job: null, edu: 0, cad: false, bolsa: false, preso: 0 };

    function update() {
        document.getElementById('v-money').innerText = "R$ " + Math.floor(p.money).toLocaleString();
        document.getElementById('v-job').innerText = p.preso > 0 ? "⛓️ PRESO" : (p.job ? p.job.n : "Desempregado");
        document.getElementById('v-age').innerText = p.age;
        document.getElementById('v-edu').innerText = p.edu;
        
        const header = document.getElementById('header');
        header.style.background = p.preso > 0 ? "#000" : "var(--green)";
    }

    function addLog(m, c="#2ecc71") {
        const l = document.getElementById('log');
        l.innerHTML += `<div class="log-item" style="border-left-color:${c}">${m}</div>`;
    }

    function envelhecer() {
        if(p.preso > 0) {
            p.preso--;
            p.age++;
            addLog(`⛓️ Você passou mais um ano na prisão. Faltam ${p.preso} anos.`, "black");
            if(p.preso === 0) addLog("🔓 Você foi solto da prisão!", "blue");
            update();
            return;
        }

        p.age++;
        let sal = 0;
        if(p.job) {
            sal = p.job.s;
            if(sal > 5000) {
                let imp = sal * 0.27;
                sal -= imp;
                addLog(`📉 Imposto retido: -R$ ${imp.toFixed(0)}`, "red");
            }
            p.money += sal;
            addLog(`💰 Recebeu R$ ${sal.toFixed(0)} de ${p.job.n}`);
        }

        if(p.bolsa) {
            if(sal > 2100) { p.bolsa = false; addLog("⚠️ Bolsa Família cancelado!", "orange"); }
            else { p.money += 600; addLog("💸 Recebeu Bolsa Família: +R$ 600", "blue"); }
        }
        update();
    }

    function abrir(tipo) {
        if(p.preso > 0) return alert("Você está preso!");
        const menu = document.getElementById('m-list');
        const lista = document.getElementById('list-content');
        const titulo = document.getElementById('m-title');
        lista.innerHTML = "";
        menu.style.display = 'flex';

        if(tipo === 'jobs') {
            titulo.innerText = "Vagas de Emprego";
            BANCO_DE_DADOS.empregos.forEach(j => {
                let pode = (p.edu >= j.e && p.age >= j.a);
                lista.innerHTML += `<div class="item-row">
                    <span><b>${j.n}</b><br><small>R$ ${j.s} | Edu Req: ${j.e}</small></span>
                    <button onclick="contratar('${j.n}')" style="background:${pode ? 'var(--blue)' : '#ccc'}">${pode ? 'ACEITAR' : 'BLOQUEADO'}</button>
                </div>`;
            });
        } else if(tipo === 'crime') {
            titulo.innerText = "Mundo do Crime";
            BANCO_DE_DADOS.crimes.forEach(c => {
                lista.innerHTML += `<div class="item-row">
                    <span><b>${c.n}</b><br><small>Ganho: R$ ${c.p} | Risco: ${c.r*100}%</small></span>
                    <button onclick="cometerCrime('${c.n}')" style="background:var(--red)">EXECUTAR</button>
                </div>`;
            });
        } else if(tipo === 'gov') {
            titulo.innerText = "Governo";
            lista.innerHTML = `<button onclick="p.cad=true; addLog('📋 Cadastro Único feito!'); fechar()" style="background:var(--blue); width:100%; margin-bottom:10px;">Fazer Cadastro Único</button>`;
            if(p.cad && !p.bolsa) lista.innerHTML += `<button onclick="pedirBolsa()" style="background:var(--green); width:100%;">Pedir Bolsa Família</button>`;
        }
    }

    function cometerCrime(nome) {
        const crime = BANCO_DE_DADOS.crimes.find(c => c.n === nome);
        if(Math.random() < crime.r) {
            p.preso = crime.t;
            p.job = null;
            addLog(`👮 POLÍCIA! Você foi preso por ${crime.t} anos!`, "red");
        } else {
            p.money += crime.p;
            addLog(`🦹 Sucesso! Você roubou R$ ${crime.p.toLocaleString()}`, "gold");
        }
        fechar();
    }

    function contratar(n) {
        let j = BANCO_DE_DADOS.empregos.find(x => x.n === n);
        if(p.edu >= j.e && p.age >= j.a) {
            p.job = j;
            addLog("💼 Novo emprego: " + n);
            fechar();
        } else { alert("Você não tem os requisitos!"); }
    }

    function estudar() {
        if(p.money >= 1000) {
            p.money -= 1000;
            p.edu += 1; // AQUI SOBE A EDUCAÇÃO
            addLog(`🎓 Você estudou! Nível de Educação agora é ${p.edu}`, "var(--yellow)");
            update();
        } else { alert("Estudar custa R$ 1.000!"); }
    }

    function pedirBolsa() {
        if((p.job ? p.job.s : 0) < 2100) { p.bolsa = true; addLog("✅ Bolsa Família aprovado!"); }
        else { alert("Renda muito alta!"); }
        fechar();
    }

    function fechar() { document.getElementById('m-list').style.display = 'none'; update(); }

    update();
</script>
</body>
</html>
